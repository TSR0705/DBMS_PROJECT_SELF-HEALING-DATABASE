name: DBMS Project CI Pipeline

# ==========================================
# 🎯 CI PIPELINE OVERVIEW
# ==========================================
# This workflow runs 7 comprehensive validation jobs:
# 1. Frontend Validation (Next.js + TypeScript)
# 2. Backend Validation (Python + FastAPI)
# 3. Database Schema Validation (MySQL)
# 4. API Validation (FastAPI Endpoints)
# 5. Security & Safety Validation
# 6. Integration Test (Full System Flow)
# 7. Integration Check (Final Validation)
# ==========================================

# Trigger CI on every push and pull request for safety and validation
on:
  push:
    branches: [ main, develop, feature/*, feat/* ]
  pull_request:
    branches: [ main, develop ]

# Ensure only one CI run per branch to prevent resource conflicts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ==========================================
  # 1️⃣ FRONTEND VALIDATION
  # ==========================================
  frontend-checks:
    name: Frontend Validation (Next.js + TypeScript)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'dbms-self-healing-ui/package-lock.json'
      
      # Install dependencies with clean slate for reproducible builds
      - name: Install Dependencies
        working-directory: dbms-self-healing-ui
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed successfully"
      
      # TypeScript compilation check - CRITICAL for type safety
      - name: TypeScript Type Check
        working-directory: dbms-self-healing-ui
        run: |
          npx tsc --noEmit --pretty
          echo "✅ TypeScript types are valid"
      
      # ESLint check - Code quality and potential bugs
      - name: ESLint Code Quality Check
        working-directory: dbms-self-healing-ui
        run: |
          npm run lint
          echo "✅ Code quality check passed"
      
      # Production build test - Ensures deployability
      - name: Next.js Production Build
        working-directory: dbms-self-healing-ui
        run: |
          npm run build
          echo "✅ Production build successful"
        env:
          # Disable telemetry for CI environment
          NEXT_TELEMETRY_DISABLED: 1

  # ==========================================
  # 2️⃣ BACKEND VALIDATION
  # ==========================================
  backend-checks:
    name: Backend Validation (Python + FastAPI)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'dbms-backend/requirements.txt'
      
      # Install Python dependencies
      - name: Install Python Dependencies
        working-directory: dbms-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python dependencies installed"
      
      # Python syntax and import validation
      - name: Python Syntax Validation
        working-directory: dbms-backend
        run: |
          python -m compileall . -f -q
          echo "✅ Python syntax is valid"
      
      # Static code analysis for Python best practices
      - name: Python Code Quality (Flake8)
        working-directory: dbms-backend
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
          echo "✅ Python code quality checks passed"
      
      # Run Python tests (if any exist)
      - name: Python Unit Tests
        working-directory: dbms-backend
        run: |
          python -m pytest -v --tb=short
          echo "✅ Python tests passed"
        env:
          # Prevent tests from trying to connect to real databases
          TESTING: true

  # ==========================================
  # 3️⃣ DATABASE SCHEMA VALIDATION (CRITICAL)
  # ==========================================
  database-schema-validation:
    name: Database Schema Validation (MySQL)
    runs-on: ubuntu-22.04
    
    # MySQL service for schema validation ONLY
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_password_123
          MYSQL_DATABASE: dbms_self_healing_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Wait for MySQL to be fully ready
      - name: Wait for MySQL Service
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 --silent; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
      
      # Validate main schema file exists and is readable
      - name: Validate Schema File Exists
        run: |
          if [ ! -f "dbms_self_healing.sql" ]; then
            echo "❌ Schema file not found"
            exit 1
          fi
          echo "✅ Schema file found: dbms_self_healing.sql"
      
      # Load and validate database database - CRITICAL STEP
      - name: Load Database Schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < dbms_self_healing.sql
          echo "✅ Database schema loaded successfully"
      
      # Load AI Engine procedures
      - name: Load AI Engine Procedures
        run: |
          for file in dbms-backend/app/database/sql/ai_engine/*.sql; do
            echo "Loading $file..."
            mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < "$file"
          done
          echo "✅ AI Engine procedures loaded successfully"
      
      # Load Decision Engine procedures
      - name: Load Decision Engine Procedures
        run: |
          for file in dbms-backend/app/database/sql/step2_engine/*.sql; do
            echo "Loading $file..."
            mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < "$file"
          done
          echo "✅ Decision Engine procedures loaded successfully"
      
      # Validate table creation and structure
      - name: Validate Database Structure
        run: |
          # Check that all expected tables exist
          TABLES=$(mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 -D dbms_self_healing_test -e "SHOW TABLES;" -s)
          
          # Expected tables from schema
          EXPECTED_TABLES="detected_issues ai_analysis decision_log healing_actions admin_reviews learning_history"
          
          echo "Found tables: $TABLES"
          
          for table in $EXPECTED_TABLES; do
            if echo "$TABLES" | grep -q "$table"; then
              echo "✅ Table '$table' exists"
            else
              echo "❌ Table '$table' missing"
              exit 1
            fi
          done
          
          echo "✅ All expected tables are present"
      
      # Validate stored procedures
      - name: Validate Stored Procedures
        run: |
          PROCEDURES=$(mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 -D dbms_self_healing_test -e "SHOW PROCEDURE STATUS WHERE Db = 'dbms_self_healing_test';" -s | awk '{print $2}')
          
          echo "Found procedures: $PROCEDURES"
          
          PROC_COUNT=$(echo "$PROCEDURES" | wc -w)
          echo "Total procedures: $PROC_COUNT"
          
          if [ "$PROC_COUNT" -lt 8 ]; then
            echo "❌ Expected at least 8 stored procedures, found $PROC_COUNT"
            exit 1
          fi
          
          echo "✅ Stored procedures are properly defined"
      
      # Validate foreign key constraints
      - name: Validate Foreign Key Constraints
        run: |
          # Check foreign key constraints are properly created
          FK_COUNT=$(mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 -D dbms_self_healing_test -e "
            SELECT COUNT(*) FROM information_schema.TABLE_CONSTRAINTS 
            WHERE CONSTRAINT_TYPE = 'FOREIGN KEY' AND TABLE_SCHEMA = 'dbms_self_healing_test';" -s)
          
          echo "Found $FK_COUNT foreign key constraints"
          
          if [ "$FK_COUNT" -lt 4 ]; then
            echo "❌ Expected at least 4 foreign key constraints, found $FK_COUNT"
            exit 1
          fi
          
          echo "✅ Foreign key constraints are properly defined"
      
      # Validate schema integrity without data manipulation
      - name: Schema Integrity Check
        run: |
          # Run ANALYZE TABLE to check for any structural issues
          mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 -D dbms_self_healing_test -e "
            ANALYZE TABLE detected_issues, ai_analysis, decision_log, healing_actions, admin_reviews, learning_history;
          "
          
          # Check for any corrupted tables
          mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 -D dbms_self_healing_test -e "
            CHECK TABLE detected_issues, ai_analysis, decision_log, healing_actions, admin_reviews, learning_history;
          "
          
          echo "✅ Database schema integrity validated"

  # ==========================================
  # 4️⃣ API VALIDATION
  # ==========================================
  api-validation:
    name: API Validation (FastAPI + Endpoints)
    runs-on: ubuntu-22.04
    needs: backend-checks
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'dbms-backend/requirements.txt'
      
      # Install Python dependencies
      - name: Install Python Dependencies
        working-directory: dbms-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python dependencies installed"
      
      # Start FastAPI server in background
      - name: Start FastAPI Server
        working-directory: dbms-backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8002 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 5
          echo "✅ FastAPI server started"
      
      # Validate API endpoints are accessible
      - name: Validate API Endpoints
        run: |
          # Test root endpoint
          if ! curl -f -s http://localhost:8002/ > /dev/null; then
            echo "❌ Root endpoint not accessible"
            exit 1
          fi
          echo "✅ Root endpoint accessible"
          
          # Test health endpoint
          if ! curl -f -s http://localhost:8002/health/ > /dev/null; then
            echo "❌ Health endpoint not accessible"
            exit 1
          fi
          echo "✅ Health endpoint accessible"
          
          # Test OpenAPI docs
          if ! curl -f -s http://localhost:8002/docs > /dev/null; then
            echo "❌ API docs not accessible"
            exit 1
          fi
          echo "✅ API docs accessible"
      
      # Validate JSON responses
      - name: Validate JSON Response Structure
        run: |
          # Test root endpoint JSON structure
          RESPONSE=$(curl -s http://localhost:8002/)
          if ! echo "$RESPONSE" | jq -e '.name and .version and .status' > /dev/null; then
            echo "❌ Root endpoint JSON structure invalid"
            exit 1
          fi
          echo "✅ Root endpoint JSON structure valid"
          
          # Test health endpoint JSON structure
          HEALTH_RESPONSE=$(curl -s http://localhost:8002/health/)
          if ! echo "$HEALTH_RESPONSE" | jq -e '.status' > /dev/null; then
            echo "❌ Health endpoint JSON structure invalid"
            exit 1
          fi
          echo "✅ Health endpoint JSON structure valid"
      
      # Stop server
      - name: Stop FastAPI Server
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
            echo "✅ FastAPI server stopped"
          fi
  security-checks:
    name: Security & Safety Validation
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Check for accidentally committed secrets
      - name: Scan for Hardcoded Secrets
        run: |
          # Check for common secret patterns (exclude test files and CI validation)
          if grep -r -i "password\s*=\s*['\"]" --include="*.py" --include="*.js" --include="*.ts" --include="*.json" . | grep -v ".env.example" | grep -v "ci_test_password" | grep -v "test_password" | grep -v "conftest.py" | grep -v "DB_PASSWORD"; then
            echo "❌ Potential hardcoded passwords found"
            exit 1
          fi
          
          if grep -r -i "api[_-]key\s*=\s*['\"]" --include="*.py" --include="*.js" --include="*.ts" . | grep -v ".env.example"; then
            echo "❌ Potential hardcoded API keys found"
            exit 1
          fi
          
          if grep -r -i "secret\s*=\s*['\"]" --include="*.py" --include="*.js" --include="*.ts" . | grep -v ".env.example" | grep -v "SECRET_KEY"; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          fi
          
          echo "✅ No hardcoded secrets detected"
      
      # Validate environment file structure
      - name: Validate Environment Configuration
        run: |
          # Check that .env.example exists but .env does not
          if [ ! -f "dbms-backend/.env.example" ]; then
            echo "❌ Missing .env.example file in backend"
            exit 1
          fi
          
          if [ -f "dbms-backend/.env" ]; then
            echo "⚠️  Warning: .env file should not be committed"
          fi
          
          echo "✅ Environment configuration is properly structured"
      
      # Check for SQL injection vulnerabilities in schema
      - name: SQL Security Validation
        run: |
          # Check for potentially dangerous SQL patterns in schema files
          if grep -i "truncate\|drop.*database" dbms_self_healing.sql 2>/dev/null; then
            echo "❌ Potentially dangerous SQL operations found"
            exit 1
          fi
          
          # Check for DROP statements without IF EXISTS (more precise regex)
          if grep -i "^drop table" dbms_self_healing.sql 2>/dev/null | grep -v -i "if exists"; then
            echo "❌ DROP statements should use IF EXISTS for safety"
            exit 1
          fi
          
          echo "✅ SQL security validation passed"

  # ==========================================
  # 5️⃣ INTEGRATION TEST (FULL SYSTEM FLOW)
  # ==========================================
  integration-test:
    name: Integration Test (Full System Flow)
    runs-on: ubuntu-22.04
    needs: [database-schema-validation, api-validation]
    
    # MySQL service for integration testing
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci_test_password_123
          MYSQL_DATABASE: dbms_self_healing_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'dbms-backend/requirements.txt'
      
      # Install Python dependencies
      - name: Install Python Dependencies
        working-directory: dbms-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Python dependencies installed"
      
      # Wait for MySQL
      - name: Wait for MySQL Service
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 --silent; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
      
      # Load schema and procedures
      - name: Load Database Schema and Procedures
        run: |
          # Load schema
          mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < dbms_self_healing.sql
          
          # Load procedures
          for file in dbms-backend/app/database/sql/ai_engine/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < "$file"
          done
          
          for file in dbms-backend/app/database/sql/step2_engine/*.sql; do
            mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test < "$file"
          done
          
          echo "✅ Database schema and procedures loaded"
      
      # Start FastAPI server
      - name: Start FastAPI Server
        working-directory: dbms-backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8002 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 5
          echo "✅ FastAPI server started"
      
      # Test full system flow
      - name: Test Full System Flow
        run: |
          # 1. Check initial state (should be empty)
          ISSUES_COUNT=$(curl -s http://localhost:8002/issues/ | jq '. | length')
          echo "Initial issues count: $ISSUES_COUNT"
          
          # 2. Insert test issue via SQL
          mysql -h 127.0.0.1 -P 3306 -u root -pci_test_password_123 dbms_self_healing_test -e "
            INSERT INTO detected_issues (issue_id, issue_type, raw_metric_value, detected_at) 
            VALUES (9999, 'DEADLOCK', 100.0, NOW());
          "
          
          # 3. Check issue was inserted
          sleep 2
          ISSUES_COUNT=$(curl -s http://localhost:8002/issues/ | jq '. | length')
          if [ "$ISSUES_COUNT" -lt 1 ]; then
            echo "❌ Issue not found in API"
            exit 1
          fi
          echo "✅ Issue detected and available via API"
          
          # 4. Check if analysis was triggered (may take time)
          sleep 5
          ANALYSIS_COUNT=$(curl -s http://localhost:8002/analysis/ | jq '. | length')
          echo "Analysis count: $ANALYSIS_COUNT"
          
          # 5. Check decisions
          DECISIONS_COUNT=$(curl -s http://localhost:8002/decisions/ | jq '. | length')
          echo "Decisions count: $DECISIONS_COUNT"
          
          # 6. Check actions
          ACTIONS_COUNT=$(curl -s http://localhost:8002/actions/ | jq '. | length')
          echo "Actions count: $ACTIONS_COUNT"
          
          # 7. Check learning history
          LEARNING_COUNT=$(curl -s http://localhost:8002/learning/ | jq '. | length')
          echo "Learning count: $LEARNING_COUNT"
          
          echo "✅ Full system flow integration test completed"
      
      # Stop server
      - name: Stop FastAPI Server
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
            echo "✅ FastAPI server stopped"
          fi
  integration-check:
    name: Integration Validation
    runs-on: ubuntu-22.04
    needs: [frontend-checks, backend-checks, database-schema-validation, security-checks, api-validation, integration-test]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Validate project structure and documentation
      - name: Project Structure Validation
        run: |
          # Check for required files
          REQUIRED_FILES="README.md dbms-self-healing-ui/package.json dbms-backend/requirements.txt dbms_self_healing.sql"
          
          for file in $REQUIRED_FILES; do
            if [ ! -f "$file" ]; then
              echo "❌ Required file missing: $file"
              exit 1
            fi
            echo "✅ Found: $file"
          done
          
          echo "✅ Project structure validation passed"
      
      # Validate API endpoint consistency
      - name: API Endpoint Consistency Check
        run: |
          # Check that backend routers match expected endpoints
          ROUTERS="health issues analysis decisions actions admin_reviews learning"
          
          for router in $ROUTERS; do
            if [ ! -f "dbms-backend/app/routers/${router}.py" ]; then
              echo "❌ Missing router: ${router}.py"
              exit 1
            fi
            echo "✅ Found router: ${router}.py"
          done
          
          echo "✅ API endpoint consistency validated"
      
      # Final integration summary
      - name: CI Pipeline Summary
        run: |
          echo "🎉 =========================================="
          echo "🎉 DBMS PROJECT CI PIPELINE - ALL 7 JOBS PASSED!"
          echo "🎉 =========================================="
          echo ""
          echo "✅ Job 1/7: Frontend Validation (Next.js + TypeScript)"
          echo "✅ Job 2/7: Backend Validation (Python + FastAPI)"
          echo "✅ Job 3/7: Database Schema Validation (MySQL)"
          echo "✅ Job 4/7: API Validation (FastAPI Endpoints)"
          echo "✅ Job 5/7: Security & Safety Validation"
          echo "✅ Job 6/7: Integration Test (Full System Flow)"
          echo "✅ Job 7/7: Integration Check (Final Validation)"
          echo ""
          echo "🔒 Academic-grade safety standards maintained"
          echo "📊 DBMS-centric validation completed"
          echo "🚀 Ready for academic review and evaluation"
          echo ""
          echo "🎯 All 7 CI jobs completed successfully!"